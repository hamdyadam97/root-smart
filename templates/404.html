{% extends "base.html" %}

{% block title %}صفحة غير موجودة - Smart Offer{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-8 text-center">
            <div class="card border-0 shadow-sm py-5">
                <div class="card-body">
                    <i class="bi bi-exclamation-circle display-1 text-danger mb-4"></i>
                    <h1 class="display-4 fw-bold text-primary mb-3">404</h1>
                    <h2 class="h3 mb-3">الصفحة غير موجودة</h2>
                    <p class="text-muted mb-4">
                        عذراً، الصفحة التي تبحث عنها غير موجودة أو قد تم نقلها.
                    </p>
                    <div class="d-flex justify-content-center gap-3">
                        {% if user.is_authenticated %}
                            <a href="{% url 'dashboard' %}" class="btn btn-primary">
                                <i class="bi bi-speedometer2"></i> لوحة التحكم
                            </a>
                        {% else %}
                            <a href="{% url 'login' %}" class="btn btn-primary">
                                <i class="bi bi-box-arrow-in-right"></i> تسجيل الدخول
                            </a>
                        {% endif %}
                        <a href="javascript:history.back()" class="btn btn-outline-secondary">
                            <i class="bi bi-arrow-right"></i> الرجوع للخلف
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
