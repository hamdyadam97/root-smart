{% extends 'base.html' %}

{% block title %}حذف مستفسر | Smart Offer{% endblock %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <h2><i class="bi bi-trash"></i> حذف مستفسر</h2>
    <a href="{% url 'prospect-list' %}" class="btn btn-outline-secondary"><i class="bi bi-arrow-right"></i> العودة</a>
</div>

<div class="card">
    <div class="card-body text-center">
        <p class="fs-5">هل أنت متأكد من حذف المستفسر <strong>{{ object.name }}</strong>؟</p>
        <form method="post">
            {% csrf_token %}
            <button type="submit" class="btn btn-danger"><i class="bi bi-trash"></i> نعم، احذف</button>
            <a href="{% url 'prospect-list' %}" class="btn btn-outline-secondary">إلغاء</a>
        </form>
    </div>
</div>
{% endblock %}
