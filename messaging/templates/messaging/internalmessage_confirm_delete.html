{% extends 'base.html' %}

{% block title %}حذف رسالة{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card border-danger">
            <div class="card-header bg-danger text-white">
                <i class="bi bi-exclamation-triangle"></i> تأكيد الحذف
            </div>
            <div class="card-body">
                <h5 class="card-title">هل أنت متأكد من حذف الرسالة <strong>{{ object.subject }}</strong>؟</h5>
                <p class="text-muted">هذا الإجراء لا يمكن التراجع عنه.</p>
                <form method="post">
                    {% csrf_token %}
                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-danger"><i class="bi bi-trash"></i> نعم، احذف</button>
                        <a href="{% url 'internalmessage-list' %}" class="btn btn-outline-secondary"><i class="bi bi-x-lg"></i> إلغاء</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
