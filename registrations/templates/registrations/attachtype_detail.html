{% extends 'base.html' %}

{% block title %}{{ attach_type.name }}{% endblock %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <h2><i class="bi bi-folder"></i> {{ attach_type.name }}</h2>
    <div>
        <a href="{% url 'attachtype-update' attach_type.pk %}" class="btn btn-warning"><i class="bi bi-pencil"></i> تعديل</a>
        <a href="{% url 'attachtype-delete' attach_type.pk %}" class="btn btn-danger"><i class="bi bi-trash"></i> حذف</a>
        <a href="{% url 'attachtype-list' %}" class="btn btn-outline-secondary"><i class="bi bi-arrow-right"></i> رجوع</a>
    </div>
</div>

<div class="card">
    <div class="card-body">
        <ul class="list-group list-group-flush">
            <li class="list-group-item"><strong>الاسم:</strong> {{ attach_type.name }}</li>
            <li class="list-group-item"><strong>الكود:</strong> {{ attach_type.code }}</li>
            <li class="list-group-item"><strong>الوصف:</strong> {{ attach_type.description|default:'-'|linebreaksbr }}</li>
        </ul>
    </div>
</div>
{% endblock %}
