{% extends 'base.html' %}

{% block title %}مرفق تسجيل{% endblock %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <h2><i class="bi bi-link"></i> مرفق تسجيل</h2>
    <div>
        <a href="{% url 'accountattach-update' account_attach.pk %}" class="btn btn-warning"><i class="bi bi-pencil"></i> تعديل</a>
        <a href="{% url 'accountattach-delete' account_attach.pk %}" class="btn btn-danger"><i class="bi bi-trash"></i> حذف</a>
        <a href="{% url 'accountattach-list' %}" class="btn btn-outline-secondary"><i class="bi bi-arrow-right"></i> رجوع</a>
    </div>
</div>

<div class="card">
    <div class="card-body">
        <ul class="list-group list-group-flush">
            <li class="list-group-item"><strong>التسجيل:</strong> {{ account_attach.account.get_key_rtl }}</li>
            <li class="list-group-item"><strong>المرفق:</strong> {{ account_attach.attach.title }}</li>
            <li class="list-group-item"><strong>تاريخ الإنشاء:</strong> {{ account_attach.created_at }}</li>
        </ul>
    </div>
</div>
{% endblock %}
